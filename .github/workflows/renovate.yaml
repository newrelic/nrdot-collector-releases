name: 🔄 Renovate

on:
  schedule:
    - cron: "0 */4 * * 1-5" # every 4 hours on weekdays
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log only, no PRs created)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Renovate
        uses: renovatebot/github-action@dd5302ec17783b2fc721b19ae7209b57b1587765 # v46.1.17
        with:
          configurationFile: .github/renovate.json5
          token: ${{ secrets.RELEASE_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.dry_run && 'debug' || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dry_run && 'full' || '' }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_GIT_AUTHOR: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
