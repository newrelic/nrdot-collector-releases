name: 🔄 Renovate

on:
  schedule:
    - cron: "0 */4 * * 1-5" # every 4 hours on weekdays
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log only, no PRs created)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Run Renovate
        uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        with:
          configurationFile: .github/renovate.json5
          token: ${{ secrets.RELEASE_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.dry_run && 'debug' || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dry_run && 'full' || '' }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_GIT_AUTHOR: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
