name: 🔄 Renovate

on:
  schedule:
    - cron: "0 */4 * * 1-5" # every 4 hours on weekdays
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log only, no PRs created)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Renovate
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          configurationFile: .github/renovate.json5
          token: ${{ secrets.RELEASE_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.dry_run && 'debug' || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dry_run && 'full' || '' }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_GIT_AUTHOR: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
