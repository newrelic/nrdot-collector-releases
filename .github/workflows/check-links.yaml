name: check-links
on:
  schedule:
    # Run every Friday at 9:00 UTC
    - cron: '0 9 * * 5'
  workflow_dispatch:

# Do not cancel this workflow on main. See https://github.com/open-telemetry/opentelemetry-collector-contrib/pull/16616
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: read-all

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      
      - name: Restore lychee cache
        id: restore-cache
        uses: actions/cache/restore@v5
        with:
          path: .lycheecache
          key: cache-lychee

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@a8c4c7cb88f0c7386610c35eb25108e448569cb0 # v2.7.0
        with:
          # no redirects to avoid accepting redirects to login pages
          args: --verbose --no-progress '**/*.md' --config .github/lychee.toml
          failIfEmpty: false
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Filter cache to successful responses only
        if: always()
        run: |
          echo "Cache contents before filtering:"
          cat .lycheecache

          echo -e "\nFiltering cache to remove non-2xx status codes..."
          # Keep only lines with 2xx status codes
          if [ -f .lycheecache ]; then
            grep ',2[0-9][0-9],' .lycheecache > .lycheecache.tmp || true
            mv .lycheecache.tmp .lycheecache
          fi

          echo -e "\nCache contents after filtering:"
          cat .lycheecache

      - name: Save lychee cache
        uses: actions/cache/save@v3
        if: always()
        with:
          path: .lycheecache
          key: ${{ steps.restore-cache.outputs.cache-primary-key }}

      - name: Send notification to Slack
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.OTELCOMM_BOTS_SLACK_HOOK }}
          webhook-type: incoming-webhook
          payload: |
            text: ":link: Broken links found in nrdot-collector-releases documentation. See workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} :link:"

