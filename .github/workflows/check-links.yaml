name: check-links
on:
  schedule:
    # Run every Friday at 9:00 UTC
    - cron: '0 9 * * 5'
  workflow_dispatch:

# Do not cancel this workflow on main. See https://github.com/open-telemetry/opentelemetry-collector-contrib/pull/16616
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: read-all

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
      
      - name: Restore lychee cache
        id: restore-cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: .lycheecache
          key: cache-lychee

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          # no redirects to avoid accepting redirects to login pages
          args: --verbose --no-progress '**/*.md' --config .github/lychee.toml
          failIfEmpty: false
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Filter cache to successful responses only
        if: always()
        run: |
          if [ ! -f .lycheecache ]; then
            echo "Cache file does not exist, skipping filtering"
            exit 0
          fi

          echo "Cache contents before filtering:"
          cat .lycheecache

          echo -e "\nFiltering cache to remove non-2xx status codes..."
          # Keep only lines with 2xx status codes
          grep ',2[0-9][0-9],' .lycheecache > .lycheecache.tmp || true
          mv .lycheecache.tmp .lycheecache

          echo -e "\nCache contents after filtering:"
          cat .lycheecache

      - name: Save lychee cache
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        if: always() && hashFiles('.lycheecache') != ''
        with:
          path: .lycheecache
          key: ${{ steps.restore-cache.outputs.cache-primary-key }}

      - name: Send notification to Slack
        if: failure()
        uses: slackapi/slack-github-action@0d95c9a7becc1e6e297d76df9bc735c44f4cbcbc # v3.0.5
        with:
          webhook: ${{ secrets.OTELCOMM_BOTS_SLACK_HOOK }}
          webhook-type: incoming-webhook
          payload: |
            text: ":link: Broken links found in nrdot-collector-releases documentation. See workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} :link:"

