name: 🔄 CI | PR / Merge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/check-links.yaml'
      - '.github/workflows/lint-conventional-commits.yaml'
      - '.github/workflows/lint-renovate-config.yaml'
      - '.github/workflows/renovate.yaml'
      - '.github/workflows/repolinter.yaml'
      - '.github/workflows/report-metrics.yaml'
      - '.github/workflows/security.yaml'
      - '.github/workflows/trivy-cache.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup Workflow
    runs-on: ubuntu-latest
    outputs:
      distributions: ${{ steps.discover.outputs.distributions }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: |
            .github/actions
            distributions/*/manifest.yaml
          sparse-checkout-cone-mode: false

      - name: Discover Distributions
        id: discover
        uses: ./.github/actions/discover-distributions

  build:
    name: Build & Validate (${{ matrix.distribution }}${{ matrix.fips && ' - FIPS' || '' }})
    needs: setup
    strategy:
      matrix:
        fips: [false, true]
        distribution: ${{ fromJson(needs.setup.outputs.distributions) }}
    uses: ./.github/workflows/ci-base.yaml
    with:
      distribution: ${{ matrix.distribution }}
      fips: ${{ matrix.fips }}
      publish: ${{ github.ref_name == 'main' && github.event_name == 'push' }}
      # namespace by distro to avoid issues with cleanup (distro 1 still running tests while distro 2 cleans up cluster)
      test_cluster_name: "${{ matrix.distribution }}-${{ github.run_id }}-${{ github.run_attempt }}"
    secrets:
      aws_account_id: ${{ vars.OTELCOMM_AWS_TEST_ACC_ACCOUNT_ID }}
      aws_oidc_role_arn: ${{ secrets.OTELCOMM_AWS_TEST_OIDC_ROLE_ARN }}
      goreleaser_key: ${{ secrets.GORELEASER_KEY }}
      gpg_private_key: ${{ secrets.OTELCOMM_GPG_PRIVATE_KEY_BASE64 }}
      gpg_passphrase: ${{ secrets.OTELCOMM_GPG_PASSPHRASE }}
      nr_ingest_key: ${{ secrets.OTELCOMM_NR_INGEST_KEY }}
      nr_account_id: ${{ vars.OTELCOMM_NR_TEST_ACCOUNT_ID }}
      nr_api_key: ${{ secrets.OTELCOMM_NR_API_KEY }}
    
  temp-windows-archive-smoke-test:
    name: (Temporary) Windows Archive Smoke Test
    runs-on: windows-latest
    steps:
      - name: Download and run collector
        shell: pwsh
        run: |
          # The only point of this test is to validate that the provided .exe instructions work. This will be removed.
          $env:collector_distro = "nrdot-collector"
          $env:collector_version = "1.15.1"
          $env:license_key = "${{ secrets.OTELCOMM_NR_INGEST_KEY }}"
          Invoke-WebRequest -Uri "https://github.com/newrelic/nrdot-collector-releases/releases/download/$env:collector_version/${env:collector_distro}_${env:collector_version}_windows_amd64.zip" -OutFile "nrdot-collector.zip"
          Expand-Archive -Path "nrdot-collector.zip" -DestinationPath "."
          $env:NEW_RELIC_LICENSE_KEY = $env:license_key
          .\nrdot-collector.exe --config .\config.yaml > collector.log 2>&1 &
          Start-Sleep -Seconds 5
          Get-Process -Name "nrdot-collector" -ErrorAction Stop
          Stop-Process -Name "nrdot-collector" -Force
          Get-Content collector.log
